name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Cache Tailwind CSS binary
        id: cache-tailwind
        uses: actions/cache@v4
        with:
          path: tailwindcss
          key: tailwindcss-linux-x64-${{ runner.os }}

      - name: Download Tailwind CSS binary
        if: steps.cache-tailwind.outputs.cache-hit != 'true'
        run: |
          curl -sLo tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss

      - name: Generate assets
        run: |
          templ generate
          ./tailwindcss -i internal/web/styles/input.css -o internal/web/assets/output.css

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SST Deploy
        run: pnpm run deploy
